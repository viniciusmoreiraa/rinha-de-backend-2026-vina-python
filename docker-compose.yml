services:
  lb:
    image: vinimoreira/rinha-2026-lb:latest
    ports:
      - "9999:9999"
    environment:
      - PORT=9999
      - UPSTREAMS=/sockets/api1.sock,/sockets/api2.sock,/sockets/api3.sock,/sockets/api4.sock
    volumes:
      - sockets:/sockets
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
      api3:
        condition: service_healthy
      api4:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.12"
          memory: "30M"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    logging:
      driver: none

  api1:
    image: vinimoreira/rinha-2026-python:latest
    environment:
      - INDEX_PATH=/index/index.bin
      - NPROBE=7
      - ADAPTIVE=1
      - REPAIR_MIN=1
      - REPAIR_MAX=4
      - MAX_REPAIR=91
      - SOCKET_PATH=/sockets/api1.sock
    volumes:
      - sockets:/sockets
    healthcheck:
      test: ["CMD-SHELL", "test -S /sockets/api1.sock"]
      interval: 1s
      timeout: 1s
      retries: 10
      start_period: 2s
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    deploy:
      resources:
        limits:
          cpus: "0.22"
          memory: "80M"
    logging:
      driver: none

