services:
  lb:
    image: nginx:alpine
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - sockets:/sockets
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    command: >
      sh -c "sleep 2 && nginx -g 'daemon off;'"
    deploy:
      resources:
        limits:
          cpus: "0.16"
          memory: "10M"
    logging:
      driver: none

  api1:
    image: vinimoreira/rinha-2026-python:latest
    environment:
      - INDEX_PATH=/index/index.bin
      - NPROBE=5
      - ADAPTIVE=1
      - REPAIR_MIN=2
      - REPAIR_MAX=3
      - MAX_REPAIR=3
      - SOCKET_PATH=/sockets/api1.sock
    volumes:
      - sockets:/sockets
    healthcheck:
      test: ["CMD", "test", "-S", "/sockets/api1.sock"]
      interval: 1s
      timeout: 1s
      retries: 30
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.42"
          memory: "170M"
    logging:
      driver: none

  api2:
    image: vinimoreira/rinha-2026-python:latest
    environment:
      - INDEX_PATH=/index/index.bin
      - NPROBE=5
      - ADAPTIVE=1
      - REPAIR_MIN=2
      - REPAIR_MAX=3
      - MAX_REPAIR=3
      - SOCKET_PATH=/sockets/api2.sock
    volumes:
      - sockets:/sockets
    healthcheck:
      test: ["CMD", "test", "-S", "/sockets/api2.sock"]
      interval: 1s
      timeout: 1s
      retries: 30
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.42"
          memory: "170M"
    logging:
      driver: none

volumes:
  sockets:
