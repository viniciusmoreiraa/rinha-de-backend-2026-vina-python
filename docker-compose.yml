services:
  lb:
    image: nginx:alpine
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - sockets:/sockets
    command: >
      sh -c "while [ ! -S /sockets/api1.sock ] || [ ! -S /sockets/api2.sock ]; do sleep 0.5; done && sleep 1 && nginx -g 'daemon off;'"
    deploy:
      resources:
        limits:
          cpus: "0.16"
          memory: "10M"
    logging:
      driver: none

  api1:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - INDEX_PATH=/index/index.bin
      - NPROBE=5
      - ADAPTIVE=1
      - REPAIR_MIN=2
      - REPAIR_MAX=3
      - MAX_REPAIR=3
      - SOCKET_PATH=/sockets/api1.sock
    volumes:
      - sockets:/sockets
    deploy:
      resources:
        limits:
          cpus: "0.42"
          memory: "170M"
    logging:
      driver: none

  api2:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - INDEX_PATH=/index/index.bin
      - NPROBE=5
      - ADAPTIVE=1
      - REPAIR_MIN=2
      - REPAIR_MAX=3
      - MAX_REPAIR=3
      - SOCKET_PATH=/sockets/api2.sock
    volumes:
      - sockets:/sockets
    deploy:
      resources:
        limits:
          cpus: "0.42"
          memory: "170M"
    logging:
      driver: none

volumes:
  sockets:
