services:
  lb:
    image: nginx:alpine
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api1:
        condition: service_started
      api2:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "0.16"
          memory: "10M"
    logging:
      driver: none

  api1:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - INDEX_PATH=/index/index.bin
      - NPROBE=5
      - ADAPTIVE=1
      - REPAIR_MIN=2
      - REPAIR_MAX=3
      - MAX_REPAIR=3
    deploy:
      resources:
        limits:
          cpus: "0.42"
          memory: "170M"
    logging:
      driver: none

  api2:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - INDEX_PATH=/index/index.bin
      - NPROBE=5
      - ADAPTIVE=1
      - REPAIR_MIN=2
      - REPAIR_MAX=3
      - MAX_REPAIR=3
    deploy:
      resources:
        limits:
          cpus: "0.42"
          memory: "170M"
    logging:
      driver: none
